# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: DINO/configs/train.yaml
# Descripción: Configuración maestra de entrenamiento para DINO.
# ==============================================================

# --------------------------------------------------------------
# Rutas base del proyecto
# --------------------------------------------------------------
paths:
  project_root: "."
  dataset_cfg: "DINO/configs/dataset.yaml"
  variants_cfg: "DINO/configs/model_variants.yaml"
  weights_dir: "DINO/weights"
  runs_dir: "DINO/runs"
  metrics_dir: "DINO/metrics"

# --------------------------------------------------------------
# Parámetros generales de entrenamiento
# --------------------------------------------------------------
training:
  variant: "r50_4scale"
  run_name: "dino_baseline"
  phase: "train"
  device: "cuda"
  epochs: 300
  batch_size: 16
  workers: 4
  lr: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  lr_drop: [150, 250]
  lr_gamma: 0.1
  clip_max_norm: 0.1
  bbox_loss_coef: 5.0
  giou_loss_coef: 2.0
  cls_loss_coef: 1.0
  focal_alpha: 0.25
  aux_loss: true
  pretrain_weights: ""
  resume: false
  exist_ok: false
  seed: 42
  use_coco128: false

# --------------------------------------------------------------
# Gestión de Hardware y Memoria (Optimización ROCm)
# --------------------------------------------------------------
hardware:
  expandable_segments: true
  empty_cache_freq: 1
  use_amp: true

miopen:
  find_mode: "FAST"
  user_db_path: "C:/Users/memorista/.miopen_db"
  disable_cache: true
  log_level: 0
  strict_before_torch: true
  verbose: 1

bn2gn:
  policy: "on"
  max_groups: 32
  min_channels_per_group: 1
  verbose: 1

# --------------------------------------------------------------
# Presets de Entrenamiento Final y Pruebas
# --------------------------------------------------------------
presets:
  dino_r50_4scale_b4:
    description: "Entrenamiento DINO ResNet-50 4-Scale (300 ep, batch 4)."
    overrides:
      training:
        variant: "r50_4scale"
        run_name: "dino_r50_4s_belt"
        epochs: 300
        batch_size: 4
        lr_drop: [150, 250]
        pretrain_weights: "DINO/weights/base/36epochs_R50_4scale.pth"

  dino_r50_5scale_b4:
    description: "Entrenamiento DINO ResNet-50 5-Scale (300 ep, batch 4)."
    overrides:
      training:
        variant: "r50_5scale"
        run_name: "dino_r50_5s_belt"
        epochs: 300
        batch_size: 4
        lr_drop: [150, 250]
        pretrain_weights: "DINO/weights/base/36epochs_R50_5scale.pth"

  dino_swin_l_4scale_b4:
    description: "Entrenamiento DINO Swin-L 4-Scale (300 ep, batch 4)."
    overrides:
      training:
        variant: "swin_l_4scale"
        run_name: "dino_swin_l_4s_belt"
        epochs: 300
        batch_size: 4
        lr_drop: [150, 250]
        pretrain_weights: "DINO/weights/base/36epochs_Swin_L_4scale.pth"

  dino_swin_l_5scale_b4:
    description: "Entrenamiento DINO Swin-L 5-Scale (300 ep, batch 4)."
    overrides:
      training:
        variant: "swin_l_5scale"
        run_name: "dino_swin_l_5s_belt"
        epochs: 300
        batch_size: 4
        lr_drop: [ 150, 250 ]
        pretrain_weights: "DINO/weights/base/36epochs_Swin_L_5scale.pth"

  coco_r50_4scale_test:
    description: "Prueba rápida DINO R50 4-Scale en COCO (300 épocas)."
    overrides:
      training:
        variant: "r50_4scale"
        run_name: "coco_dino_r50_4s_test"
        epochs: 300
        batch_size: 4
        lr_drop: [150, 250]
        use_coco128: true
        pretrain_weights: "DINO/weights/base/36epochs_R50_4scale.pth"