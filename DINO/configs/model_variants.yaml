# --------------------------------------------------------------
# Archivo: DINO/configs/model_variants.yaml
# Descripción: Definición técnica de las variantes de DINO.
#              *MODIFICADO*: Parámetros ajustados para consistencia
#              con DETR (num_queries=100) y mitigación de OOM en
#              ROCm (n_points=2, dn_number=50).
#              *MODIFICADO*: use_checkpoint global para aplanar
#              el consumo de VRAM en el Transformer (R50 y Swin).
# ==============================================================

shared_transformer_params: &shared_transformer
  hidden_dim: 256
  nheads: 8
  enc_layers: 6
  dec_layers: 6
  dim_feedforward: 2048
  dropout: 0.1          # Ajustado a 0.1 para consistencia con DETR
  num_queries: 100      # Reducido de 900 a 100 (Consistencia DETR y ahorro VRAM)
  position_embedding: "sine"
  pre_norm: false
  use_checkpoint: true  # [AÑADIDO]: Activa Gradient Checkpointing globalmente (Backbone + Transformer)
  # --- DINO Specifics ---
  use_dn: true
  dn_number: 50         # Reducido de 100 a 50 (Ahorro VRAM en Contrastive DeNoising)
  dn_box_noise_scale: 0.4
  dn_label_noise_ratio: 0.5
  two_stage_type: "standard"
  enc_n_points: 2       # Reducido de 4 a 2 (Mitigación crítica OOM en Deformable Attention)
  dec_n_points: 2       # Reducido de 4 a 2 (Mitigación crítica OOM en Deformable Attention)
  use_deformable_box_attn: false
  box_attn_type: "roi_align"
  decoder_sa_type: "sa"

variants:
  r50_4scale:
    description: "DINO base con backbone ResNet-50 y 4 escalas de características."
    backbone: "resnet50"
    dilation: false
    num_feature_levels: 4
    return_interm_indices: [1, 2, 3]
    <<: *shared_transformer

  r50_5scale:
    description: "DINO con backbone ResNet-50 y 5 escalas (Optimizado para objetos pequeños)."
    backbone: "resnet50"
    dilation: false
    num_feature_levels: 5
    return_interm_indices: [0, 1, 2, 3]
    <<: *shared_transformer

  swin_l_4scale:
    description: "DINO con backbone Swin-L y 4 escalas (State-of-the-Art)."
    backbone: "swin_L_384_22k"
    dilation: false
    num_feature_levels: 4
    return_interm_indices: [1, 2, 3]
    <<: *shared_transformer

  swin_l_5scale:
    description: "DINO con backbone Swin-L y 5 escalas (Máxima precisión y costo computacional)."
    backbone: "swin_L_384_22k"
    dilation: false
    num_feature_levels: 5
    return_interm_indices: [0, 1, 2, 3]
    <<: *shared_transformer