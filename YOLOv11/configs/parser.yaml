# parser.yaml
# Configuration file for YOLOv11 project paths and runtime parameters

project_name: yolov11
task: detect
model: configs/yolo11.yaml
dataset: configs/dataset.yaml

# Paths
paths:
  root_dir: ${oc.env:PROJECT_ROOT, .}
  data_dir: ${paths.root_dir}/data
  runs_dir: ${paths.root_dir}/runs
  weights_dir: ${paths.root_dir}/weights
  log_dir: ${paths.root_dir}/logs
  results_dir: ${paths.root_dir}/results

# Training setup
device: 0
imgsz: 640
batch: 16
epochs: 100
workers: 8
seed: 42

# Model scale
scale: n  # options: [n, s, m, l, x]
