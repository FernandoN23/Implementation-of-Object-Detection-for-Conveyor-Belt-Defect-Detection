# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: YOLOv11/configs/train_presets.yaml
# Descripción:
#   Catálogo de presets de entrenamiento y pruebas para YOLOv11.
#   Cada preset define un conjunto de overrides sobre los defaults
#   de parser.yaml / train.yaml, pensados para:
#     - smoketests (ensamblaje y forward),
#     - pruebas de warmup/MIOpen/AMP,
#     - entrenamientos cortos de diagnóstico,
#     - escenarios de referencia con overlays y TensorBoard.
#   Estructura:
#     presets:
#       <nombre_preset>:
#         description: "Texto explicativo"
#         overrides:
#           <clave_train>: <valor>
#   La lógica de precedencia final (en el CLI) se mantiene como:
#     CLI explícito > preset (overrides) > YAML parser/train > defaults internos.
#==============================================================

presets:

  # ------------------------------------------------------------
  # TESTS PRINCIPALES (test-*)
  # ------------------------------------------------------------

  test-A:
    description: >
      Smoketest de ensamblaje + warmup sanity. Verifica que el modelo,
      el dataloader y el entorno MIOpen/AMP inicializan correctamente
      con un ciclo mínimo de warmup.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true                # imprime info del DataLoader
      variant: "s"
      batch: 4
      epochs: 0                    # sin entrenamiento prolongado
      imgsz: 640
      test: true                   # modo prueba (no se asume run final)
      warmup_epochs: 1
      warmup: "sanity"             # warmup básico/sanity-check
      bn2gn: "on"                  # migración a GN forzada (pendiente consolidar)
      amp: "fp16"                  # fuerza FP16 para probar AMP
      hud: true                    # HUD activo en consola
      miopen_disable_cache: true   # desactiva caché MIOpen en smoketest

  test-B:
    description: >
      Test de warmup intensivo. Evalúa estabilidad de MIOpen/AMP con
      un esquema de warmup más agresivo ("fast") antes de entrenamientos largos.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 4
      epochs: 0
      imgsz: 640
      test: true
      warmup_epochs: 1
      warmup: "fast"               # más iteraciones de calentamiento
      bn2gn: "on"
      amp: "auto"                  # intenta bf16 si está disponible, si no fp16
      hud: true
      miopen_disable_cache: true

  test-C:
    description: >
      Escenario de 10 épocas con overlays de pivotes activados. Permite
      revisar métricas, comportamiento de overlays y val_int con coste
      computacional acotado (tipo pre-entrenamiento de referencia).
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 8
      epochs: 10
      imgsz: 640
      test: false
      warmup_epochs: 1
      warmup: "sanity"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      # validación interna periódica en TRAIN
      val_int_interval: 2          # cada 2 épocas
      val_int_use_train_subset: false
      val_int_split: "train"
      val_int_max_batches: 0       # 0 → usa todos los batches del split
      # overlays de pivotes
      val_int_pivots: true
      val_int_conf: 0.10
      val_int_tb_conf: 0.10
      # TensorBoard (puede activarse por CLI)
      val_int_tb: false            # se puede forzar con --val-int-tb
      val_int_tb_nrow: 3
      val_int_tb_topk: 5
      dataset_base: "Dataset"      # base para resolución de rutas de pivotes
      miopen_disable_cache: true

  test-D:
    description: >
      Escenario tipo “entrenamiento de referencia” con 100 épocas,
      validación interna cada 10 épocas, overlays de pivotes y registro
      en TensorBoard. Pensado como aproximación al entrenamiento final.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 8
      epochs: 100
      imgsz: 640
      test: false
      warmup_epochs: 1
      warmup: "sanity"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      # validación interna periódica en TRAIN
      val_int_interval: 10
      val_int_use_train_subset: false
      val_int_split: "train"
      val_int_max_batches: 0
      # overlays + TensorBoard
      val_int_pivots: true
      val_int_conf: 0.10
      val_int_tb_conf: 0.10
      val_int_tb: true
      val_int_tb_nrow: 3
      val_int_tb_topk: 5
      dataset_base: "Dataset"
      miopen_disable_cache: true

  # ------------------------------------------------------------
  # FORWARD Y STRESS DE WARMUP
  # ------------------------------------------------------------

  forward:
    description: >
      Forward puro del primer minibatch (sin warmup). Verifica ensamblaje
      del modelo y compatibilidad DataLoader → modelo sin coste adicional.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 4
      epochs: 1
      imgsz: 640
      test: true                    # se comporta como prueba, no run final
      warmup_epochs: 0
      warmup: "off"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      miopen_disable_cache: true

  stress-warmup:
    description: >
      Stress test de warmup completo con dos ciclos ("full"). Diseñado
      para cachear kernels, perfilar MIOpen y estabilizar AMP antes de
      ejecutar entrenamientos extensos.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      variant: "s"
      batch: 4
      epochs: 1
      imgsz: 640
      test: true
      warmup_epochs: 2
      warmup: "full"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      miopen_disable_cache: true

  # ------------------------------------------------------------
  # SMOKETESTS DE ENTRENAMIENTO
  # ------------------------------------------------------------

  smoke-1ep:
    description: >
      Smoketest de 1 época para validar el lazo completo de entrenamiento
      (forward + backward + optimizador) y la integración básica de
      validación interna en un entorno de baja carga.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 4
      epochs: 1
      imgsz: 640
      test: false                   # ya se considera mini-entrenamiento
      warmup_epochs: 1
      warmup: "sanity"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      # val_int activo en todas las épocas
      val_int_interval: 1
      val_int_use_train_subset: true
      val_int_max_batches: 1        # un batch de TRAIN para val_int
      val_int_conf: 0.10
      val_int_tb_conf: 0.10
      val_int_tb: false             # se puede activar para inspección visual
      miopen_disable_cache: true

  smoke-3ep:
    description: >
      Smoketest de 3 épocas orientado a analizar estabilidad de pérdidas,
      comportamiento de EMA y scheduler, con validación interna en cada
      época sobre un subconjunto de entrenamiento.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 8
      epochs: 3
      imgsz: 640
      test: false
      warmup_epochs: 1
      warmup: "sanity"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      # val_int en cada época
      val_int_interval: 1
      val_int_use_train_subset: true
      val_int_max_batches: 1        # un batch de TRAIN por val_int
      val_int_conf: 0.10
      val_int_tb_conf: 0.10
      val_int_tb: true              # registra overlays en TensorBoard
      miopen_disable_cache: true

  smoke-overfit:
    description: >
      Escenario de overfit controlado sobre un subconjunto muy pequeño
      del dataset (limit_images=2). Útil para detectar problemas de
      capacidad del modelo, fugas de gradiente o errores en la función
      de pérdida/optimización.
    overrides:
      data: "configs/dataset.yaml"
      model: "configs/yolo11.yaml"
      parser: "configs/parser.yaml"
      dl_info: true
      variant: "s"
      batch: 4
      epochs: 80                    # suficientes para que el modelo sobreajuste
      imgsz: 640
      test: false
      warmup_epochs: 1
      warmup: "sanity"
      bn2gn: "on"
      amp: "fp16"
      hud: true
      # limitación fuerte del dataset → overfit
      limit_images: 2
      # val_int sobre el mismo TRAIN
      val_int_interval: 1
      val_int_use_train_subset: true
      val_int_split: "train"
      val_int_max_batches: 1
      val_int_conf: 0.10
      val_int_tb_conf: 0.10
      val_int_tb: true
      miopen_disable_cache: true
