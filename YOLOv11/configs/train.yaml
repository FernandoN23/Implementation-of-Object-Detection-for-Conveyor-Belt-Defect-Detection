# ============================================================
# train.yaml
# Training configuration for YOLOv11
# ============================================================

# -------------------------------
# Dataset and model paths
# -------------------------------
model: YOLOv11/configs/yolo11.yaml
data: YOLOv11/configs/dataset.yaml

# -------------------------------
# Training setup
# -------------------------------
epochs: 100
validate_every: 5
resume: false
checkpoint_path: "YOLOv11/checkpoints/yolo11_epoch_10.pt"

optimizer:
  type: "AdamW"
  lr: 0.001
  weight_decay: 0.0005

# -------------------------------
# Learning rate and scheduler
# -------------------------------
momentum: 0.937
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
lrf: 0.01        # final learning rate fraction

# -------------------------------
# Device and workers
# -------------------------------
device: 0
workers: 8
patience: 20

# -------------------------------
# Logging and checkpoints
# -------------------------------
project: YOLOv11/runs/train
name: yolov11_exp
save_period: 5
exist_ok: false

# -------------------------------
# DataLoader configuration
# -------------------------------
dataloader:
  path: "YOLOv11/data/train/images"   # ruta base del dataset
  batch_size: 16                      # tamaño de lote ajustable según VRAM
  img_size: 640                       # resolución estándar YOLOv11
  num_workers: 8                      # aprovecha 95 GB RAM
  shuffle: true                       # mezcla los datos en cada epoch
  pin_memory: true                    # mejora transferencia CPU→GPU
  persistent_workers: true            # mantiene hilos activos
  cache_images: false                 # precarga opcional (activar si SSD lento)
  precision: "float16"                # mixed precision (AMD ROCm compatible)
