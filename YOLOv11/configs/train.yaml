# train.yaml
# Training hyperparameters for YOLOv11

# Dataset and model configs
model: configs/yolo11.yaml
data: configs/dataset.yaml

# Training setup
epochs: 100
batch: 16
imgsz: 640
device: 0
workers: 8
patience: 20
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1

# Logging and saving
project: runs/train
name: yolov11_exp
save_period: 5
exist_ok: false
