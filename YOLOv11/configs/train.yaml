# configs/train.yaml

# ==============================================================
# CONFIGURACIÓN DE ENTRENAMIENTO - YOLOv11
# ==============================================================

# Tipo de modelo a entrenar (n, s, m, l, x)
model_variant: n

# Número total de épocas
epochs: 100

# Cada cuántas épocas validar
validate_every: 5

# Dataset y batch
batch_size: 8
img_size: 640

# Optimizador
optimizer:
  lr: 0.001
  weight_decay: 0.0005
  type: AdamW

# Reanudar entrenamiento previo
resume: false
