# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: train.yaml
# (Hiperparámetros y opciones por defecto para train.py; incluye
#  guardado periódico de checkpoints y configuración para resume)
#==============================================================

# ===== Datos =====
imgsz: 640
rect: false
cache: false

# ===== Optimizador y LR Schedule =====
optimizer: adamw            # sgd|adam|adamw
lr0: 0.0015                 # learning rate inicial
lrf: 0.2                    # factor mínimo (cosine decay)
weight_decay: 0.01
momentum: 0.9               # si usas SGD
betas: [0.9, 0.999]         # si usas Adam/AdamW
epochs: 150
batch: 16
warmup_steps: 3             # (estricto) usado por el parser; alias: warmup_epochs
scheduler: cosine           # cosine|onecycle|linear

# ===== Dataloader =====
dataloader:
  workers: 4
  pin_memory: true
  persistent_workers: true
  shuffle: true

# ===== Entrenamiento =====
amp: true                   # mixed precision (default desde YAML; CLI invierte)
ema: true
ema_decay: 0.9999
grad_accum: 1               # acumulación de gradiente
max_grad_norm: 0.0          # 0 desactiva clipping
label_smoothing: 0.0
patience: 50                # early stopping
val_interval: 1             # validar cada N epochs
overlay_every: 0            # predicciones/overlays cada N epochs (0 desactiva)
pr_curves_every: 0          # curvas P-R cada N epochs (0 desactiva)
cm_every: 0                 # matriz de confusión cada N epochs (0 desactiva)
verbosity: v1               # v0|v1|v2 (HUD/log)
hud: one                    # off|one|two
bn_eval_fallback: false     # si quisieras fijar un default desde YAML

# ===== Pérdidas (ponderadores) =====
loss:
  box: 7.5
  cls: 0.5
  dfl: 1.5

# ===== Aumentación =====
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.10
scale: 0.50                 # ±50%
shear: 0.0
perspective: 0.0
fliplr: 0.5
flipud: 0.0
mosaic: 0.5
mixup: 0.10
copy_paste: 0.0
erasing: 0.0

# ===== Evaluación =====
conf_thr: 0.10              # alias soportado: conf_thres
iou_thr: 0.50               # alias soportado: iou_thres
plots: true

# ===== Guardado/Monitoreo =====
tensorboard: true
wandb: false

# Checkpoints por época (activado en train.py; política definida en parser.yaml)
save:
  save_best: true
  save_last: true
  save_period: 10           # (desde parser.yaml en producción; aquí solo referencial)
  keep_checkpoint_max: 5
