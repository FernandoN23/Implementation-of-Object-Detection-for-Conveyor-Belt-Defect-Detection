# Archivo: train.yaml
# Configuración de entrenamiento del modelo YOLOv11.
# Controla el tipo de variante, hiperparámetros y validaciones.
# ==============================================================

model_variant: n     # Variante (n, s, m, l, x)
epochs: 100          # Número total de épocas
validate_every: 5    # Frecuencia de validación

batch_size: 8
img_size: 640

optimizer:
  type: AdamW
  lr: 0.001
  weight_decay: 0.0005

resume: true        # Reanudar desde checkpoint previo
