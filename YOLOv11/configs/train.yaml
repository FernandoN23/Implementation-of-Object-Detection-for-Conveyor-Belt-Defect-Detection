# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: train.yaml
# Configuración de entrenamiento del modelo YOLOv11.
# Controla la variante, hiperparámetros y validaciones.
# ==============================================================

# ------------------------------
# CONFIGURACIÓN GENERAL
# ------------------------------
model: configs/yolo11.yaml
data: configs/dataset.yaml
model_variant: n          # Variante del modelo (n, s, m, l, x)

# ------------------------------
# PARÁMETROS DE ENTRENAMIENTO
# ------------------------------
epochs: 100               # Número total de épocas
validate_every: 5         # Frecuencia de validación
batch_size: 8
img_size: 640
device: 0
workers: 4

# ------------------------------
# OPTIMIZADOR
# ------------------------------
optimizer:
  type: AdamW
  lr: 0.002
  weight_decay: 0.0005

# ------------------------------
# OPCIONES DE SESIÓN
# ------------------------------
resume: true              # Reanudar desde checkpoint previo
project: runs/train
name: yolov11_training
exist_ok: false
verbose: true

# ------------------------------
# PARÁMETROS DEL LOADER
# ------------------------------
loader:
  shuffle: true
  pin_memory: true
  drop_last: false
