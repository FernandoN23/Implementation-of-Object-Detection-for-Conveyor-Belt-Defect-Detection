# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: valid.yaml
# Configuración de validación e inferencia para YOLOv11.
# Define los parámetros de evaluación, umbrales y métricas.
# ==============================================================

# ------------------------------
# CONFIGURACIÓN GENERAL
# ------------------------------
model: configs/yolo11.yaml
data: configs/dataset.yaml
weights: weights/best.pt
task: detect

# ------------------------------
# PARÁMETROS DE VALIDACIÓN
# ------------------------------
imgsz: 640
batch: 8
device: 0
workers: 4
save_json: true
save_txt: false
save_conf: true
save_images: true
plots: true

# ------------------------------
# UMBRALES DE DETECCIÓN
# ------------------------------
conf: 0.25         # Threshold de confianza
iou: 0.7           # IoU para NMS (anchor-free)
max_det: 300       # Máximo de detecciones por imagen

# ------------------------------
# MÉTRICAS A EVALUAR
# ------------------------------
metrics:
  - precision
  - recall
  - map50
  - map50_95
  - confusion_matrix

# ------------------------------
# OPCIONES DE SESIÓN
# ------------------------------
project: runs/val
name: yolov11_validation
exist_ok: false
verbose: true

# ------------------------------
# PARÁMETROS DEL LOADER
# ------------------------------
loader:
  shuffle: false
  pin_memory: true
  drop_last: false
