# Archivo: SSD/configs/train.yaml
# Descripción: Configuración de hiperparámetros para entrenamiento y validación interna.
# ==============================================================

# -----------------------------------------------------------------
# Identidad del experimento
# -----------------------------------------------------------------
experiment:
  task: detect
  variant: ssd300
  run_name: ssd300_belt_defects
  phase: train

# -----------------------------------------------------------------
# Rutas base del proyecto SSD
# -----------------------------------------------------------------
paths:
  dataset_config: SSD/configs/dataset.yaml
  weights_root: SSD/weights
  runs_root: SSD/runs
  metrics_root: SSD/metrics
  base_weights: SSD/weights/base/vgg16_reducedfc.pth

# -----------------------------------------------------------------
# Presets de entrenamiento
# -----------------------------------------------------------------
presets:
  # ---------------------------------------------------------------
  # 1) Preset principal: SSD300
  # ---------------------------------------------------------------
  ssd300:
    is_test: false
    dataset_backend: yolo
    dataset_root: C:/Users/memorista/Desktop/Implementation-of-Object-Recognition-Algorithms-for-Conveyor-Belt-Defect-Detection/Dataset
    yolo_sets:
      train: train/images
      val:   valid/images
      test:  test/images

    # Hiperparámetros de optimización
    opt: SGD
    lr: 0.005
    momentum: 0.9
    weight_decay: 0.001
    gamma: 0.1

    # CORREGIDO: Basado en 100 iters/época (Batch 16)
    # Paso 1: Época 125 * 100 = 12500
    # Paso 2: Época 150 * 100 = 15000
    lr_steps: [ 12500, 15000 ]

    # Configuración de entrenamiento
    img_dim: 300
    batch_size: 16
    max_iter: 20000          # CORREGIDO: 200 épocas * 100 iters
    num_workers: 6

    device: ""
    resume: null
    save_period: 100         # Guardar cada época (100 iters)
    seed: 0
    exist_ok: false

    loss:
      overlap_thresh: 0.5
      neg_pos_ratio: 3
      neg_overlap: 0.5

    inference:
      conf_thresh: 0.01
      nms_thresh: 0.45
      top_k: 200

    augmentation:
      mean: [104, 117, 123]
      brightness_delta: 32
      contrast_range: [0.5, 1.5]
      saturation_range: [0.5, 1.5]
      hue_delta: 18
      random_mirror_prob: 0.5

    logging:
      ndjson_console: false
      ndjson_file: false

    bn2gn:
      enabled: false
      policy: "off"
      max_groups: 32
      min_channels_per_group: 1
      verbose: 1

    miopen:
      enabled: true
      env:
        MIOPEN_ENABLE_LOGGING: "0"
        MIOPEN_FIND_MODE: "1"
        MIOPEN_DEBUG_DISABLE_FIND_DB: "1"

  # ---------------------------------------------------------------
  # 2) Preset principal: SSD512
