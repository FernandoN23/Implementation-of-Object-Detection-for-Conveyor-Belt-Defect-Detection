# Archivo: SSD/configs/train.yaml
# Descripción: Configuración de hiperparámetros para entrenamiento y validación interna.
# ==============================================================

# -----------------------------------------------------------------
# Identidad del experimento (Valores por defecto / Fallback)
# -----------------------------------------------------------------
experiment:
  task: detect
  variant: ssd300           # Default (se sobrescribe por el preset)
  run_name: default_run     # Default (se sobrescribe por el preset)
  phase: train

# -----------------------------------------------------------------
# Rutas base del proyecto SSD
# -----------------------------------------------------------------
paths:
  dataset_config: SSD/configs/dataset.yaml
  weights_root: SSD/weights
  runs_root: SSD/runs
  metrics_root: SSD/metrics
  base_weights: SSD/weights/base/vgg16_reducedfc.pth

# -----------------------------------------------------------------
# Presets de entrenamiento
# -----------------------------------------------------------------
presets:
  # ---------------------------------------------------------------
  # 1) Preset principal: SSD300
  # ---------------------------------------------------------------
  ssd300:
    # Identidad Específica
    variant: ssd300
    run_name: ssd300        # Carpeta de salida: .../ssd300/train/ssd300/

    is_test: false
    dataset_backend: yolo
    dataset_root: C:/Users/memorista/Implementation-of-Object-Detection-for-Conveyor-Belt-Defect-Detection/Dataset
    yolo_sets:
      train: train/images
      val:   valid/images
      test:  test/images

    # Hiperparámetros de optimización
    opt: SGD
    lr: 0.001
    momentum: 0.937
    weight_decay: 0.0005
    gamma: 0.1

    # Estrategia de Learning Rate (Base: 1 Epoch = 100 iters aprox)
    # Drops en época 140, 170 y 250.
    lr_steps: [ 14000, 17000, 25000 ]

    # Configuración de entrenamiento (Extendido a 300 épocas)
    img_dim: 300
    batch_size: 16
    max_iter: 30000
    num_workers: 4

    device: ""
    resume: null
    save_period: 100
    seed: 0
    exist_ok: false

    loss:
      overlap_thresh: 0.5
      neg_pos_ratio: 3
      neg_overlap: 0.5

    inference:
      conf_thresh: 0.01
      nms_thresh: 0.45
      top_k: 200

    # Parámetros de augmentación
    augmentation:
      mean: [104, 117, 123]
      brightness_delta: 32
      contrast_range: [0.5, 1.5]
      saturation_range: [0.5, 1.5]
      hue_delta: 18
      random_mirror_prob: 0.5

    logging:
      ndjson_console: false
      ndjson_file: false

    bn2gn:
      enabled: false
      policy: "off"
      max_groups: 32
      min_channels_per_group: 1
      verbose: 1

    miopen:
      enabled: true
      env:
        MIOPEN_ENABLE_LOGGING: "0"
        MIOPEN_FIND_MODE: "1"
        MIOPEN_DEBUG_DISABLE_FIND_DB: "1"

  # ---------------------------------------------------------------
  # 2) Preset principal: SSD512
  # ---------------------------------------------------------------
  ssd512:
    # Identidad Específica
    variant: ssd512
    run_name: ssd512        # Carpeta de salida: .../ssd512/train/ssd512/

    is_test: false
