# Archivo: SSD/configs/dataset.yaml
# Descripción: Configuración del dataset utilizado por el modelo SSD.
#              Define rutas, clases y formato de anotaciones.
# ==============================================================

# Raíz del dataset (compartida con YOLO)
path: C:/Users/memorista/Implementation-of-Object-Detection-for-Conveyor-Belt-Defect-Detection/Dataset

# Rutas relativas a 'path' para SSD (layout tipo YOLO: images + labels)
train:
  images: train/images
  labels: train/labels

val:
  images: valid/images
  labels: valid/labels

test:
  images: test/images
  labels: test/labels

# Clases del problema de defectos en correas
names:
  0: Hole
  1: Impact Damage
  2: Puncture
  3: Tear
  4: Wear

# Formato de anotaciones en disco
# - 'yolo': archivos .txt por imagen con líneas:
#   <class_id> <cx> <cy> <w> <h>   (coordenadas normalizadas en [0,1])
format: yolo

# Dimensión de entrada recomendada por defecto para SSD300
img_dim_default: 300
