# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: DETR/configs/valid.yaml
# Descripción: Configuración maestra para validación DETR.
#              Incluye presets para auto-descubrimiento de pesos.
# ==============================================================

paths:
  dataset_cfg: "DETR/configs/dataset.yaml"
  variants_cfg: "DETR/configs/model_variants.yaml"

validation:
  phase: "val"
  variant: "r50"
  run_name: "val_default"
  weights: ""
  batch_size: 2
  workers: 4
  device: "cuda"
  conf_thres: 0.5
  plots: true

miopen:
  find_mode: "FAST"
  user_db_path: "C:/Users/memorista/.miopen_db"
  disable_cache: true
  verbose: 1

bn2gn:
  policy: "on"
  verbose: 1

presets:
  # ----------------------------------------------------------
  # Presets de Validación (Auto-descubrimiento de pesos)
  # ----------------------------------------------------------
  val_detr_r50_belt:
    description: "Validación del modelo R50 entrenado en correas."
    overrides:
      validation:
        variant: "r50"
        run_name: "detr_r50_belt" # Debe coincidir con el run_name de train.yaml
        weights: "" # Vacío para que valid.py busque best.pt automáticamente
        batch_size: 2

  val_coco_r50_std:
    description: "Validación del modelo R50 estándar."
    overrides:
      validation:
        variant: "r50"
        run_name: "coco_r50_standard"
        weights: ""
        batch_size: 2