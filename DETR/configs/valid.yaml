# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: DETR/configs/valid.yaml
# Descripción: Configuración maestra para validación y pruebas
#              (inferencia) del modelo DETR.
# ==============================================================

paths:
  dataset_cfg: "DETR/configs/dataset.yaml"
  variants_cfg: "DETR/configs/model_variants.yaml"

validation:
  phase: "valid"
  variant: "r50"
  run_name: "val_default"
  weights: ""
  batch_size: 4
  workers: 4
  device: "cuda"
  conf_thres: 0.5

  # Configuración de Reportes Visuales
  plots: true
  plot_ratio: 0.20  # Proporción del dataset a dibujar (20%)
  max_images: 50    # Límite máximo de imágenes a guardar

miopen:
  find_mode: "FAST"
  user_db_path: "C:/Users/memorista/.miopen_db"
  disable_cache: true
  verbose: 1

bn2gn:
  policy: "on"
  verbose: 1

presets:
  # ==========================================================
  # Presets de Validación Final
  # ==========================================================

  val_detr_r50:
    description: "Validación del modelo R50 entrenado del proyecto."
    overrides:
      validation:
        variant: "r50"
        run_name: "detr_r50_belt"
        weights: ""
        batch_size: 16

  val_detr_r50_dc5:
    description: "Validación del modelo R50 DC5 entrenado del proyecto."
    overrides:
      validation:
        variant: "r50_dc5"
        run_name: "detr_r50_dc5_belt"
        weights: ""
        batch_size: 16

  val_detr_r101:
    description: "Validación del modelo R101 entrenado del proyecto."
    overrides:
      validation:
        variant: "r101"
        run_name: "detr_r101_belt"
        weights: ""
        batch_size: 16

  val_detr_r101_dc5:
    description: "Validación del modelo R101 DC5 entrenado del proyecto."
    overrides:
      validation:
        variant: "r101_dc5"
        run_name: "detr_r101_dc5_belt"
        weights: ""
        batch_size: 16

  # ==========================================================
  # Presets de Validación de Pruebas (COCO)
  # ==========================================================

  val_coco_r50_test:
    description: "Validación de la prueba R50 en COCO."
    overrides:
      validation:
        variant: "r50"
        run_name: "coco_r50_test"
        weights: ""
        batch_size: 4

  val_coco_r50_dc5_test:
    description: "Validación de la prueba R50 DC5 en COCO."
    overrides:
      validation:
        variant: "r50_dc5"
        run_name: "coco_r50_dc5_test"
        weights: ""
        batch_size: 4