# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: DETR/configs/train.yaml
# Descripción: Configuración maestra para el entrenamiento.
#              Incluye presets para COCO y datasets masivos.
# ==============================================================

paths:
  project_root: "."
  dataset_cfg: "DETR/configs/dataset.yaml"
  variants_cfg: "DETR/configs/model_variants.yaml"
  weights_dir: "DETR/weights"
  runs_dir: "DETR/runs"
  metrics_dir: "DETR/metrics"

training:
  variant: "r50"
  run_name: "detr_belt_baseline"
  phase: "train"
  device: "cuda"

  # Hiperparámetros base (DETR Standard)
  epochs: 300
  batch_size: 2
  workers: 4
  lr: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  lr_drop: 200
  clip_max_norm: 0.1

  # Coeficientes de pérdida
  bbox_loss_coef: 5.0
  giou_loss_coef: 2.0
  eos_coef: 0.1
  aux_loss: true

  # Pesos por defecto
  pretrain_weights: "DETR/weights/base/detr-r50-e632da11.pth"

  # Reanudar entrenamiento (false | true | ruta/a/last.pt)
  resume: false
  exist_ok: false
  seed: 42

miopen:
  find_mode: "FAST"
  user_db_path: "C:/Users/memorista/.miopen_db"
  disable_cache: true
  log_level: 0
  strict_before_torch: true
  verbose: 1

bn2gn:
  policy: "on"
  max_groups: 32
  min_channels_per_group: 1
  verbose: 1

presets:
  # ----------------------------------------------------------
  # Presets específicos para el Proyecto (Cintas Transportadoras)
  # ----------------------------------------------------------
  detr_r50_belt:
    description: "Fine-tuning estándar ResNet-50 para fallas en correas."
    overrides:
      training:
        variant: "r50"
        run_name: "detr_r50_belt"
        epochs: 300
        batch_size: 2
        lr_drop: 100

  # ----------------------------------------------------------
  # Presets Oficiales COCO (Replicación de Paper)
  # ----------------------------------------------------------
  coco_r50_std:
    description: "Configuración original DETR R50 (100 épocas)."
    overrides:
      training:
        variant: "r50"
        run_name: "coco_r50_standard"
        epochs: 100
        lr_drop: 200
        pretrain_weights: "DETR/weights/base/detr-r50-e632da11.pth"

  coco_r50_dc5:
    description: "Configuración DETR R50 con Dilated C5 (Alta resolución)."
    overrides:
      training:
        variant: "r50_dc5"
        run_name: "coco_r50_dc5"
        epochs: 100
        batch_size: 1  # DC5 es intensivo en VRAM
        lr_drop: 200
        pretrain_weights: "DETR/weights/base/detr-r50-dc5-f0fb7ef5.pth"

  coco_r101_std:
    description: "Configuración DETR R101 (Máxima precisión base)."
    overrides:
      training:
        variant: "r101"
        run_name: "coco_r101_standard"
        epochs: 100
        lr_drop: 200
        pretrain_weights: "DETR/weights/base/detr-r101-2c7b67e5.pth"

  # ----------------------------------------------------------
  # Presets para Datasets Masivos (Long Schedules)
  # ----------------------------------------------------------
  massive_r50_long:
    description: "Entrenamiento extendido (300 épocas) para datasets masivos."
    overrides:
      training:
        variant: "r50"
        run_name: "massive_r50_500ep"
        epochs: 300
        lr_drop: 400
        batch_size: 2
        weight_decay: 0.0001

  massive_r101_dc5_ultra:
    description: "Configuración Ultra: R101 + DC5 + 300 épocas."
    overrides:
      training:
        variant: "r101_dc5"
        run_name: "massive_r101_dc5_ultra"
        epochs: 300
        batch_size: 1
        lr_drop: 400
        pretrain_weights: "DETR/weights/base/detr-r101-dc5-a2e86def.pth"