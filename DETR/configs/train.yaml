# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: DETR/configs/train.yaml
# Descripción: Configuración maestra para el entrenamiento.
# ==============================================================

paths:
  project_root: "."
  dataset_cfg: "DETR/configs/dataset.yaml"
  variants_cfg: "DETR/configs/model_variants.yaml"
  weights_dir: "DETR/weights"
  runs_dir: "DETR/runs"
  metrics_dir: "DETR/metrics"

training:
  variant: "r50"
  run_name: "detr_belt_baseline"
  phase: "train"
  device: "cuda"

  epochs: 300
  batch_size: 2
  workers: 4
  lr: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  lr_drop: 200
  clip_max_norm: 0.1

  bbox_loss_coef: 5.0
  giou_loss_coef: 2.0
  eos_coef: 0.1
  aux_loss: true

  pretrain_weights: "DETR/weights/base/detr-r50-e632da11.pth"
  resume: false
  seed: 42

miopen:
  find_mode: "FAST"
  user_db_path: "C:/Users/memorista/.miopen_db"
  disable_cache: true
  log_level: 0
  strict_before_torch: true
  verbose: 1

bn2gn:
  policy: "on"
  max_groups: 32
  min_channels_per_group: 1
  verbose: 1

presets:
  detr_r50_belt:
    overrides:
      training:
        variant: "r50"
        run_name: "detr_r50_belt"
        epochs: 150
        batch_size: 2