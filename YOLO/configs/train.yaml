# ==============================================================
# Departamento de Ingeniería Mecánica - Universidad de Chile
# Trabajo de Memoria de Título:
# "Implementación de algoritmos de reconocimiento de objetos
#  para la identificación de fallas en correas transportadoras"
# Autor: Fernando N.
# --------------------------------------------------------------
# Archivo: YOLO/configs/train.yaml
# Descripción: Configuración maestro de entrenamiento para el
#              orquestador YOLO/train.py y el motor engine/Trainer.
#              Define rutas, política MIOpen/BN2GN y presets de prueba.
# ==============================================================

# --------------------------------------------------------------
# Rutas base del proyecto
# --------------------------------------------------------------
paths:
  # Directorio raíz lógico del proyecto (desde donde se ejecuta YOLO/train.py)
  project_root: "."

  # Configuración del dataset principal del proyecto
  # → Debe apuntar a YOLO/configs/dataset.yaml, el cual referencia:
  #   Proyecto/Dataset (mismo nivel de la carpeta YOLO)
  dataset_cfg: "YOLO/configs/dataset.yaml"

  # Raíz del código original de YOLOv5
  yolov5_root: "YOLO/yolov5"

  # Directorios de salida unificados del proyecto
  weights_dir: "YOLO/weights"   # checkpoints consolidados (last/best)
  runs_dir:    "YOLO/runs"      # carpetas de ejecución (logs, results.csv, etc.)
  metrics_dir: "YOLO/metrics"   # métricas procesadas propias (a futuro utility/metrics.py)


# --------------------------------------------------------------
# Parámetros generales de entrenamiento
# --------------------------------------------------------------
training:
  # Tarea principal
  task: "detect"        # por ahora sólo detección (YOLOv5); a futuro: "classify", "segment", etc.

  # Variante del modelo (YOLOv11 a futuro; aquí sirve como etiqueta lógica)
  variant: "s"          # n | s | m | l | x

  # Identidad del experimento
  run_name: "belt_defects_baseline"

  # Dispositivo (vacío = autodetección en Trainer/select_device)
  device: ""

  # Configuración base de entrenamiento
  epochs: 100
  batch_size: 8
  imgsz: 640
  workers: 4            # dataloader workers por proceso

  # Dataset y HPO de YOLOv5
  # - dataset_cfg se toma de `paths.dataset_cfg` (dataset del proyecto).
  # - hyp_yaml referencia un .yaml estándar de YOLOv5 (hiperparámetros base).
  hyp_yaml: "YOLO/yolov5/data/hyps/hyp.scratch-low.yaml"

  # Pesos iniciales (puede ser ruta vacía para entrenamiento desde cero)
  # - Ruta relativa al root del proyecto o absoluta.
  pretrain_weights: "YOLO/yolov5/yolov5s.pt"

  # Opciones de entrenamiento (se mapean 1:1 a argumentos de yolov5/train.py)
  rect: false           # entrenamiento rectangular
  single_cls: false     # forzar todo como una sola clase
  cache: "ram"          # ram | disk | null
  image_weights: false
  multi_scale: false
  sync_bn: false
  cos_lr: false         # usar cosine LR scheduler
  optimizer: "SGD"      # SGD | Adam | AdamW (mapeado a smart_optimizer)
  label_smoothing: 0.0
  patience: 50          # EarlyStopping patience (epochs)
  save_period: -1       # guardar epochX cada N epochs (desactivado si < 1)
  seed: 0               # semilla global

  # Logging NDJSON (para compatibilidad futura con utilidades personalizadas)
  ndjson_console: false
  ndjson_file: false


# --------------------------------------------------------------
# Política MIOpen (Windows ROCm Preview)
# --------------------------------------------------------------
miopen:
  # Modo de búsqueda de kernels:
  #   FAST   → recomendado para primeras corridas (equilibrio velocidad/robustez).
  #   NORMAL → búsqueda estándar.
  #   HYBRID → heurísticas híbridas.
  find_mode: "FAST"

  # Carpeta de DB de usuario MIOpen (se crea si no existe).
  # - Dejar en null para que MIOpen use su comportamiento por defecto.
  user_db_path: null

  # *** POLÍTICA PROYECTO: DESACTIVAR SIEMPRE LA CACHÉ ***
  # - engine/bootstrap_miopen.py exporta MIOPEN_DISABLE_CACHE=1 si este
  #   valor es true, y YOLO/train.py puede forzarlo igualmente a true.
  disable_cache: true   # <- requerido: caché siempre deshabilitada

  # Nivel de log MIOpen (0 silencioso, 1 info, 2 debug)
  log_level: 0

  # Variables extra (HIP_VISIBLE_DEVICES, HSA_OVERRIDE_GFX_VERSION, etc.)
  extra_env: {}

  # Verificación estricta: falla si torch ya fue importado antes del bootstrap.
  strict_before_torch: true

  # Verbosidad local del bootstrap (0, 1, 2)
  verbose: 1


# --------------------------------------------------------------
# Política BatchNorm2d → GroupNorm (BN2GN)
# --------------------------------------------------------------
bn2gn:
  # Política:
  #   "off"      → no aplicar patch (no recomendado en ROCm si se observan fallas).
  #   "on"       → sustituir BatchNorm2d por GroupNorm globalmente.
  #   "on_error" → intentar BN; si falla por errores típicos MIOpen, reintentar con GN.
  policy: "on"          # *** PROYECTO: BN2GN ON por defecto ***

  # Máximo de grupos para GroupNorm (el helper del patch elegirá el mejor divisor)
  max_groups: 32

  # Mínimo de canales por grupo (evitar grupos degenerados)
  min_channels_per_group: 1

  # Verbosidad del patch BN2GN (0: silencioso, 1: info, 2: detalle)
  verbose: 1


# --------------------------------------------------------------
# Presets de prueba rápida (smoke tests)
# --------------------------------------------------------------
presets:
  # ----------------------------------------------------------
  # 1. Prueba rápida con coco128 + yolov5s.pt
  #    Objetivo: validar que toda la tubería (bootstrap MIOpen,
  #    bn2gn, Trainer, yolov5/train, métricas y plots) funciona.
  # ----------------------------------------------------------
  smoke_coco128_yolov5s:
    description: "Prueba rápida con coco128 y yolov5s.pt para validar el pipeline end-to-end."

    # Overrides frente a las secciones 'paths' y 'training'
    overrides:
      paths:
        # Se usa directamente el dataset oficial coco128.yaml de YOLOv5
        dataset_cfg: "YOLO/yolov5/data/coco128.yaml"

      training:
        run_name: "smoke_coco128_yolov5s"
        epochs: 1
        batch_size: 4
        imgsz: 640
        pretrain_weights: "YOLO/yolov5/yolov5s.pt"
        hyp_yaml: "YOLO/yolov5/data/hyps/hyp.scratch-low.yaml"
        rect: false
        single_cls: false
        cache: "ram"

  # ----------------------------------------------------------
  # 2. Prueba rápida con Dataset del proyecto (Proyecto/Dataset)
  #    Objetivo: validar integración con dataset.yaml del proyecto
  #    y rutas Proyecto/Dataset (nivel superior a YOLO).
  # ----------------------------------------------------------
  smoke_project_dataset_scratch:
    description: "Prueba corta sobre el Dataset del proyecto entrenando desde cero."

    overrides:
      paths:
        # Reutiliza la configuración principal del dataset del proyecto
        dataset_cfg: "YOLO/configs/dataset.yaml"

      training:
        run_name: "smoke_project_scratch"
        epochs: 3
        batch_size: 4
        imgsz: 640
        pretrain_weights: ""  # entrenamiento desde cero (sin .pt inicial)
        hyp_yaml: "YOLO/yolov5/data/hyps/hyp.scratch-low.yaml"
        rect: true
        single_cls: false
        cache: "ram"
