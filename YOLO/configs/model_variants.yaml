# --------------------------------------------------------------
# Archivo: model_variants.yaml
# Descripción:
# Resumen ilustrativo de las variantes YOLOv5 (Ultralytics),
# incluyendo parámetros de escalado y anclas base de detección.
# ==============================================================

# Anclas base YOLOv5 (COCO, P3–P5)
yolov5_anchors: &yolov5_anchors
  - [10, 13, 16, 30, 33, 23]          # P3/8
  - [30, 61, 62, 45, 59, 119]         # P4/16
  - [116, 90, 156, 198, 373, 326]     # P5/32

variants:

  # ------------------------------------------------------------
  # Familia YOLOv5 – Ultralytics v6.0 (resumen de variantes)
  # Hiperparámetros extraídos de yolov5[n,s,m,l,x].yaml
  # (se omite 'nc', número de clases).
  # ------------------------------------------------------------

  v5_n:
    family: yolov5
    cfg_path: yolov5/models/yolov5n.yaml
    depth_multiple: 0.33
    width_multiple: 0.25
    anchors: *yolov5_anchors

  v5_s:
    family: yolov5
    cfg_path: yolov5/models/yolov5s.yaml
    depth_multiple: 0.33
    width_multiple: 0.50
    anchors: *yolov5_anchors

  v5_m:
    family: yolov5
    cfg_path: yolov5/models/yolov5m.yaml
    depth_multiple: 0.67
    width_multiple: 0.75
    anchors: *yolov5_anchors

  v5_l:
    family: yolov5
    cfg_path: yolov5/models/yolov5l.yaml
    depth_multiple: 1.00
    width_multiple: 1.00
    anchors: *yolov5_anchors

  v5_x:
    family: yolov5
    cfg_path: yolov5/models/yolov5x.yaml
    depth_multiple: 1.33
    width_multiple: 1.25
    anchors: *yolov5_anchors
